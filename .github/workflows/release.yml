name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run semantic-release
        uses: jedi-knights/go-semantic-release@44d82f5b1d93faa273eb9108f361280df9379dfd  # v0.10.2
        with:
          version: v0.10.2
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect new release
        id: tag
        run: |
          git fetch --tags --force
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ -z "$TAG" ]; then
            echo "No release created — nothing to package."
          else
            echo "Released: $TAG"
          fi

      - name: Build source tarball
        if: steps.tag.outputs.tag != ''
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # git archive respects .gitattributes export-ignore for per-path
          # exclusion and produces a versioned prefix directory so `tar -xzf`
          # lands the source in ctestprobe-<ver>/ instead of splattering it.
          VER="${TAG#v}"
          TAR_NAME="ctestprobe-${VER}.tar.gz"
          git archive --format=tar.gz \
            --prefix="ctestprobe-${VER}/" \
            -o "$TAR_NAME" \
            "$TAG"
          echo "TAR_NAME=$TAR_NAME" >> "$GITHUB_ENV"

      - name: Build single-header amalgamation
        if: steps.tag.outputs.tag != ''
        run: make single-header

      - name: Attach source tarball and single-header to release
        if: steps.tag.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
              "$TAR_NAME" \
              single_include/ctestprobe.h \
              --clobber
