name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      # Feed the owner/repo into semantic-release's config layer — the tool does
      # not auto-detect these and its VerifyConditions check isn't wired into
      # the release path, so an unset owner produces a POST to
      # /repos///releases and a 404 at publish time.
      SEMANTIC_RELEASE_GITHUB_OWNER: ${{ github.repository_owner }}
      SEMANTIC_RELEASE_GITHUB_REPO: ${{ github.event.repository.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run semantic-release
        uses: jedi-knights/go-semantic-release@44d82f5b1d93faa273eb9108f361280df9379dfd  # v0.10.2
        with:
          version: v0.10.2
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect new release
        id: tag
        run: |
          git fetch --tags --force
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ -z "$TAG" ]; then
            echo "No release created — nothing to package."
          else
            echo "Released: $TAG"
          fi

      - name: Build source tarball
        if: steps.tag.outputs.tag != ''
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          make clean
          TAR_NAME="ctestprobe-${TAG}.tar.gz"
          tar -czvf "$TAR_NAME" \
            --exclude='*docs*' \
            --exclude='.git' \
            --exclude='*.github*' \
            --exclude='*examples*' \
            --exclude='*tests*' \
            --exclude='*homebrew*' \
            --exclude='.gitignore' \
            --exclude='LICENSE' \
            *
          echo "TAR_NAME=$TAR_NAME" >> "$GITHUB_ENV"

      - name: Attach tarball to release
        if: steps.tag.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.tag.outputs.tag }}" "$TAR_NAME" --clobber
